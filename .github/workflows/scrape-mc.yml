name: Scrape Chinese Minecraft Wiki with MWoffliner

on:
  workflow_dispatch: # 允许您在 GitHub 页面手动点击按钮触发抓取
  schedule:
    - cron: '0 0 1 * *' # 可选：每月 1 号自动运行一次

jobs:
  scrape-mc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 清理磁盘空间
      # 默认 GitHub Runner 仅剩余约 14GB 磁盘空间，而 Minecraft Wiki 包含大量图片
      # 此步骤可清理无用组件，释放出大约 30GB 的额外空间
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 2. 创建挂载目录
      - name: Create output and temp directories
        run: |
          mkdir -p ${{ github.workspace }}/out
          mkdir -p ${{ github.workspace }}/tmp
          chmod -R 777 ${{ github.workspace }}/out
          chmod -R 777 ${{ github.workspace }}/tmp

      # 3. 安装并启动 Redis 服务（MWoffliner 运行时必需）
      - name: Start Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
          sudo service redis-server start
          # 验证 redis 是否正常启动
          redis-cli ping

      # 4. 设置匹配项目要求的 Node.js 版本 (项目中要求 >=26 <27)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm'

      # 5. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 6. 编译 TypeScript 代码（该步骤生成 lib/ 目录下的 JS 代码）
      - name: Build project
        run: npm run build

      # 7. 使用当前生成的代码运行刮取任务
      - name: Run local MWoffliner
        run: |
          node lib/cli.js \
            --mwUrl="https://zh.minecraft.wiki" \
            --adminEmail="zhou20120904@126.com" \
            --mwActionApiPath="/api.php" \
            --mwModulePath="/load.php" \
            --customZimTitle="Minecraft Wiki (zh)" \
            --customZimDescription="中文我的世界维基致力于收集一切和 Minecraft 有关的信息。" \
            --customZimLanguage="zho" \
            --publisher="openZIM" \
            --outputDirectory="/output" \
            --osTmpDir="/tmpdir" \
            --webp \
            --forceRender="ActionParse" \
            --speed=5 \
            --langVariant="zh-cn" \
            --getCategories \
            --javaScript="all" \
            --logLevel="debug"

      # 8. 上传生成的 ZIM 归档文件
      - name: Upload ZIM file as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-wiki-zh
          path: ${{ github.workspace }}/out/*.zim
          retention-days: 32
